version: '3.8'

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    restart: always
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${IBKR_TRADING_MODE:-paper}
      TWS_SETTINGS_PATH: /root/Jts
      TWOFA_TIMEOUT_ACTION: restart
      AUTO_RESTART_TIME: "23:45"
      RELOGIN_AFTER_2FA_TIMEOUT: "yes"
    ports:
      - "127.0.0.1:4001:4001"
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:5900:5900"
    volumes:
      - ib-gateway-settings:/root/Jts
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "${IBKR_GATEWAY_PORT:-4002}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-titan}
      POSTGRES_USER: ${POSTGRES_USER:-titan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-titan}"]
      interval: 10s
      timeout: 3s
      retries: 3

  questdb:
    image: questdb/questdb:latest
    restart: always
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:8812:8812"
      - "127.0.0.1:9009:9009"
    volumes:
      - questdb-data:/var/lib/questdb
    environment:
      QDB_HTTP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 10s
      timeout: 3s
      retries: 3

  titan:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      ib-gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      questdb:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./config:/app/config
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - postgres
      - questdb

volumes:
  ib-gateway-settings:
  redis-data:
  postgres-data:
  questdb-data:
  prometheus-data:
  grafana-data:
