# IBC Configuration for IB Gateway auto-management
# Used by gnzsnz/ib-gateway Docker image
#
# Reference: https://github.com/IbcAlpha/IBC/blob/master/userguide.md

[IBGateway]
# Trading mode: paper or live (overridden by IBKR_TRADING_MODE env var)
TradingMode=paper

# API configuration
ApiOnly=yes
ReadOnlyApi=no

# Auto-restart on daily maintenance window (00:15-01:45 ET)
AutoRestart=yes
AutoRestartTime=01:00

# Logging
IbDir=/opt/ibc/logs

[Authentication]
# Credentials sourced from environment variables:
#   IBKR_USERNAME → IB_USERNAME
#   IBKR_PASSWORD → IB_PASSWORD
# Do NOT hardcode credentials in this file.

[API]
# Allow connections from Docker network
TrustedIPs=0.0.0.0/0
BindAddress=0.0.0.0

# Port configuration (4001=live, 4002=paper)
PortNumber=4002

# Socket client connections
MaxSocketClients=32

[Notifications]
# Accept non-brokerage account data notifications
AcceptNonBrokerageAccountWarning=yes
AcceptIncomingConnectionAction=accept
DismissPasswordExpiryWarning=yes
DismissNSEComplianceNotice=yes

[Performance]
# Minimize memory footprint for VPS deployment
MinimizeMainWindow=yes
ExistingSessionDetectedAction=secondary
