[server]
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = admin
cookie_secure = false
cookie_samesite = lax

[auth.anonymous]
enabled = false

[users]
allow_sign_up = false

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/titan.json

[log]
mode = console
level = info

[log.console]
format = json

[unified_alerting]
enabled = true
